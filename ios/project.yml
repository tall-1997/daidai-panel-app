name: DaidaiPanel
options:
  bundleIdPrefix: com.daidai
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_ENTITLEMENTS: ""
    ENABLE_BITCODE: "NO"

targets:
  DaidaiPanel:
    type: application
    platform: iOS
    sources:
      - path: DaidaiPanel
        excludes:
          - "**/*.xcassets"
    resources:
      - path: DaidaiPanel/Resources
      - path: DaidaiPanel/LaunchScreen.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daidai.panel
        INFOPLIST_FILE: DaidaiPanel/Info.plist
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_BITCODE: "NO"
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    dependencies: []
