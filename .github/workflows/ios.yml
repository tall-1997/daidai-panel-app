name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: daidai-panel
  APP_VERSION: "0.0.1"

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          mkdir -p ../ios/DaidaiPanel/web
          cp -r dist/* ../ios/DaidaiPanel/web/

      - name: Build Go mobile bindings
        run: |
          cd server
          go get golang.org/x/mobile
          go get golang.org/x/mobile/cmd/gomobile
          go get golang.org/x/mobile/cmd/gobind
          gomobile bind -target=ios -iosversion=16.0 -o ../ios/DaidaiPanel/DaidaiPanel.xcframework ./mobile

      - name: Import Code Signing Certificate
        if: env.IOS_CERTIFICATE_P12 != ''
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}

      - name: Build iOS App (Archive)
        run: |
          cd ios/DaidaiPanel
          xcodebuild -scheme DaidaiPanel \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/DaidaiPanel.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA (Signed)
        if: env.IOS_CERTIFICATE_P12 != ''
        run: |
          cd ios/DaidaiPanel
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath $PWD/build/DaidaiPanel.xcarchive \
            -exportPath $PWD/build/export \
            -exportOptionsPlist ExportOptions.plist
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}

      - name: Prepare unsigned archive
        if: env.IOS_CERTIFICATE_P12 == ''
        run: |
          mkdir -p ios/DaidaiPanel/build/export
          cd ios/DaidaiPanel/build
          # Zip the xcframework for distribution without signing
          zip -r export/DaidaiPanel.xcframework.zip DaidaiPanel.xcframework || true
          # Create a placeholder IPA note
          echo "No signing certificate configured. Archive only (xcframework.zip)." > export/README.txt
          cp -r DaidaiPanel.xcarchive export/ 2>/dev/null || true
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: daidai-panel-ios-${{ env.APP_VERSION }}
          path: |
            ios/DaidaiPanel/build/export/*.ipa
            ios/DaidaiPanel/build/export/*.xcframework.zip
            ios/DaidaiPanel/build/export/*.xcarchive
            ios/DaidaiPanel/build/export/README.txt
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ios/DaidaiPanel/build/export/*.ipa
            ios/DaidaiPanel/build/export/*.xcframework.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
