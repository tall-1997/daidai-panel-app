name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: daidai-panel
  APP_VERSION: "0.0.1"

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
          mkdir -p ../android/app/src/main/assets/web
          cp -r dist/* ../android/app/src/main/assets/web/

      - name: Build Go mobile bindings
        run: |
          cd server
          go get golang.org/x/mobile
          go get golang.org/x/mobile/cmd/gomobile
          go get golang.org/x/mobile/cmd/gobind
          mkdir -p ../android/app/libs
          gomobile bind -target=android -androidapi=24 -o ../android/app/libs/daidai-panel.aar ./mobile

      - name: Build Android APK
        run: |
          cd android
          # Remove existing gradle wrapper and regenerate
          rm -rf gradle/wrapper
          mkdir -p gradle/wrapper
          # Download gradle wrapper from official source
          curl -sL https://services.gradle.org/distributions/gradle-8.10-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          cp /tmp/gradle/gradle-8.10/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar
          # Update wrapper properties
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign APK
        if: ${{ env.KEYSTORE_PASSWORD != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daidai-panel-android-${{ env.APP_VERSION }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
