name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: daidai-panel
  APP_VERSION: "0.0.1"

jobs:
  # Build frontend first
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # Build Android
  build-android:
    needs: build-frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: android/app/src/main/assets/web/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go mobile bindings
        run: |
          cd server
          go get golang.org/x/mobile
          go get golang.org/x/mobile/cmd/gomobile
          go get golang.org/x/mobile/cmd/gobind
          mkdir -p ../android/app/libs
          gomobile bind -target=android -androidapi=24 -o ../android/app/libs/daidai-panel.aar ./mobile

      - name: Build Android APK
        run: |
          cd android
          gradle assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: daidai-panel-android-${{ env.APP_VERSION }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # Build iOS
  build-ios:
    needs: build-frontend
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ios/DaidaiPanel/DaidaiPanel/web/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Go mobile bindings
        run: |
          cd server
          go get golang.org/x/mobile
          go get golang.org/x/mobile/cmd/gomobile
          go get golang.org/x/mobile/cmd/gobind
          mkdir -p ../ios/DaidaiPanel/DaidaiPanel.xcframework
          gomobile bind -target=ios -iosversion=16.0 -o ../ios/DaidaiPanel/DaidaiPanel.xcframework ./mobile

      - name: Import Code Signing Certificate
        if: env.IOS_CERTIFICATE_P12 != ''
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}

      - name: Build iOS App (Archive)
        run: |
          cd ios/DaidaiPanel
          xcodebuild -scheme DaidaiPanel \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/DaidaiPanel.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA (Signed)
        if: env.IOS_CERTIFICATE_P12 != ''
        run: |
          cd ios/DaidaiPanel
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath $PWD/build/DaidaiPanel.xcarchive \
            -exportPath $PWD/build/export \
            -exportOptionsPlist ExportOptions.plist
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}

      - name: Prepare unsigned archive
        if: env.IOS_CERTIFICATE_P12 == ''
        run: |
          mkdir -p ios/DaidaiPanel/build/export
          cd ios/DaidaiPanel/build
          zip -r export/DaidaiPanel.xcframework.zip DaidaiPanel.xcframework || true
          echo "No signing certificate configured. Archive only (xcframework.zip)." > export/README.txt
          cp -r DaidaiPanel.xcarchive export/ 2>/dev/null || true
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: daidai-panel-ios-${{ env.APP_VERSION }}
          path: |
            ios/DaidaiPanel/build/export/*.ipa
            ios/DaidaiPanel/build/export/*.xcframework.zip
            ios/DaidaiPanel/build/export/*.xcarchive
            ios/DaidaiPanel/build/export/README.txt
          retention-days: 30

  # Create Release (Android required, iOS optional)
  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: daidai-panel-android-${{ env.APP_VERSION }}

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: daidai-panel-ios-${{ env.APP_VERSION }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.apk
            *.ipa
            *.xcframework.zip
            *.xcarchive
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
